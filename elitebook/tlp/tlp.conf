# TLP power management configuration for Intel Core Ultra (Meteor Lake)
# Install: sudo dnf install tlp tlp-rdw
# Apply:   sudo tlp start

# ── CPU ──────────────────────────────────────────────────────────────────────
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=powersave

CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power

CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

# Cap battery performance to 30% max — aggressive but extends runtime significantly
CPU_MAX_PERF_ON_BAT=30

# ── PCIe ─────────────────────────────────────────────────────────────────────
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersupersave

# ── Wi-Fi ────────────────────────────────────────────────────────────────────
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# ── Bluetooth ────────────────────────────────────────────────────────────────
DEVICES_TO_DISABLE_ON_BAT_NOT_IN_USE="bluetooth"

# ── Platform ─────────────────────────────────────────────────────────────────
PLATFORM_PROFILE_ON_AC=balanced
PLATFORM_PROFILE_ON_BAT=low-power
