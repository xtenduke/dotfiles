# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

# Fix the escape delay for Neovim (1ms for responsiveness without artifacts)
set -s escape-time 1

# HOOOJ Scrollback
set -g history-limit 50000

# Enable focus events for Neovim (needed for 'autoread' and plugin hooks)
set -g focus-events on

# -----------------------------------------------------------------------------
# Terminal & Colors
# -----------------------------------------------------------------------------

# Set default terminal for 256 colors
set -g default-terminal "tmux-256color"

# True Color (Tc) support for xterm-based terminals (Alacritty/Windows Terminal)
set -as terminal-overrides ",xterm*:Tc"

# Undercurl support and color support (for Neovim diagnostics)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%dm'

# -----------------------------------------------------------------------------
# Mouse Support (Pane resizing, clicking, scrolling)
# -----------------------------------------------------------------------------

# This single command replaces the deprecated mouse-resize-pane flag
set -g mouse on

# Allow tmux to send selection to system clipboard via OSC 52
# (Works over SSH in Windows Terminal, Alacritty, and Ghostty)
set -g set-clipboard on

# Optional: Don't jump to bottom after selecting text with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# -----------------------------------------------------------------------------
# Key Bindings & Navigation
# -----------------------------------------------------------------------------

# Use Vi mode for copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Vim-like pane splitting
bind-key v split-window -h
bind-key s split-window -v

# Vim-like pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R


# No neon statusbar
set -g status-bg black
set -g status-fg white

# High-contrast pane borders (makes the 'hitbox' easier to see)
set -g pane-border-style fg=colour238
set -g pane-active-border-style "bg=default fg=white"

# try set a thicker char for divier
set -as terminal-overrides ",*:U8=0"

# Resize exp
setw -g aggressive-resize on
