### Don't delay escape (fucking annoying delay when running nvim inside tmux ###
# set -s escape-time 0
# Escape time to 1ms to avoid win-term issue - default is 500ms
set -s escape-time 1

#Vim mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# Vim-like navigation
bind-key v split-window -h
bind-key s split-window -v
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set -g status-bg black
set -g status-fg white

# Set the default terminal terminfo
set -g default-terminal "tmux-256color"
# True colour support
set -as terminal-overrides ",xterm*:Tc"
# Undercurl support (squiggly underlines)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# Undercurl color support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%dm'

set -g set-clipboard on

# Maybe this will help copying through ssh
set -g mouse on


# Wooooooooooooosh
set -g history-limit 50000
